services:
  - type: web
    name: rotaka-server
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread -w 1 --threads 100 --bind 0.0.0.0:$PORT rotaka_server:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /
