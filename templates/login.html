{% extends 'base.html' %}
{% block title %}Rotaka — Giriş{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h2 data-i18n="login.title">Giriş Yap</h2>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label data-i18n="login.username">Kullanıcı Adı</label>
        <input class="input" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label data-i18n="login.password">Şifre</label>
        <input class="input" type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" data-i18n="login.submit">Giriş Yap</button>
    </form>

    {% if google_available %}
    <div class="auth-divider">— veya —</div>
    <a href="{{ url_for('auth_google') }}" class="btn btn-ghost btn-full" data-i18n="login.google">Google ile Giriş Yap</a>
    {% endif %}
  </div>
  <div class="auth-link">
    <span data-i18n="login.no_acc">Hesabın yok mu?</span>
    <a href="{{ url_for('register') }}" data-i18n="login.register">Kayıt Ol</a>
  </div>
</div>
{% endblock %}
