{% extends 'base.html' %}
{% block title %}Rotaka — Kayıt{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h2 data-i18n="register.title">Kayıt Ol</h2>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label data-i18n="login.username">Kullanıcı Adı</label>
        <input class="input" name="username" required minlength="3" autocomplete="username">
      </div>
      <div class="form-group">
        <label data-i18n="login.password">Şifre</label>
        <input class="input" type="password" name="password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" data-i18n="register.submit">Hesap Oluştur</button>
    </form>
  </div>
  <div class="auth-link">
    <span data-i18n="register.have_acc">Zaten hesabın var mı?</span>
    <a href="{{ url_for('login') }}" data-i18n="nav.login">Giriş Yap</a>
  </div>
</div>
{% endblock %}
